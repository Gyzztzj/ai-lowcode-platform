name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

defaults:
  run:
    shell: bash

jobs:
  commit-lint:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取所有提交历史

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Railway支持的版本

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        run: |
          # 处理PR和直接推送两种情况
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            pnpm commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.sha }} --verbose
          else
            pnpm commitlint --from=HEAD~1 --to=HEAD --verbose
          fi

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: commit-lint
    strategy:
      matrix:
        workspace: [server, web]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        workspace: [server, web]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: matrix.workspace == 'web'
        run: pnpm typecheck

      - name: Build
        run: pnpm build
