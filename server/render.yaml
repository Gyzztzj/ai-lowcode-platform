services:
  - type: web
    name: ai-lowcode-api
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-lowcode-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-lowcode-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    autoDeploy: true

  # ↓↓↓ 这里是正确放 Redis 的地方 ↓↓↓
  - type: redis
    name: ai-lowcode-redis
    plan: free
    ipAllowList: []

# ↓↓↓ databases 只保留数据库，不放 Redis ↓↓↓
databases:
  - name: ai-lowcode-db
    databaseName: ai_lowcode
    user: ai_lowcode
    plan: free
    ipAllowList: []
