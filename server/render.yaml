services:
  - type: web
    name: ai-lowcode-api
    env: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-lowcode-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-lowcode-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    autoDeploy: true

databases:
  - name: ai-lowcode-db
    databaseName: ai_lowcode
    user: ai_lowcode
    plan: free
    ipAllowList: []

  - name: ai-lowcode-redis
    type: redis
    plan: free
    ipAllowList: []
