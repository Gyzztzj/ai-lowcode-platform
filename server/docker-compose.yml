services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: ai-lowcode-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AiLowcode123!}
      POSTGRES_DB: ${POSTGRES_DB:-ai-lowcode-platform}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ai-lowcode-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ai-lowcode-platform
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-lowcode-api
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: always
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:${PORT:-3000} || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
